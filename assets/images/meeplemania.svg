<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img" aria-label="MeepleManía">
    <defs>
        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#2f6df6"/>
            <stop offset="1" stop-color="#6fa3ff"/>
        </linearGradient>
    </defs>

    <!-- Icono -->
    <g transform="translate(18,18)">
        <rect x="0" y="0" width="104" height="104" rx="26" fill="url(#g)"/>

        <!-- Meeple centrado ópticamente -->
        <g transform="translate(52,56) scale(1.28) translate(-32,-36)">
            <g fill="#ffffff">
                <circle cx="32" cy="22" r="8"/>
                <path d="M14 54 Q14 38 26 33 Q29 32 32 36 Q35 32 38 33 Q50 38 50 54 Z"/>
            </g>
        </g>
    </g>

    <!-- Wordmark -->
    <text x="150" y="86"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
          font-size="56"
          font-weight="800"
          fill="#111827">
        Meeple<tspan fill="#2f6df6">Manía</tspan>
    </text>

    <text x="152" y="112"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
          font-size="16"
          font-weight="600"
          fill="#6b7280">
        Juegos de mesa online
    </text>
</svg>
